body:
  text: 慈雲伯亭大師古希紀自識實行庚辰夏取靜於龍岡北泉石間焉山川蒼松竹陰翳輕雲遠去數鳥徐來忽如忘生不知有人世也崇壽三如避席叩曰文侍來歷年多矣師之出家學道因緣願示始終後進聞之不亦益乎時遂以六十花甲年譜諭之今又七旬矣復以十年中事補贅不使覧者有遺憾焉予姓沈仁和亭溪人父諱相母張氏生於崇禎十四年歲次辛巳十月十一日戌時順治三年丙戌六歲時水漂不溺賊斫不傷火炙不爛丁亥七歲見一僧摩頂異之即發心出家母不許己丑九歲辭親投禮杭城慈雲祖源尊宿為師也諱續法字百亭十一二歲習朝暮課誦大小經懺旁及四書詩易十四五時因師裝修佛殿日間收飯供眾夜晚禮佛持呪丙申十六剃髮十七八九當家理事常住佛像經懺悉皆修葺一新三載將畢己亥冬即辭師於南屏豁堂嵒和尚座下求戒十一月望旦腹生一癰跽大士前諷楞嚴呪求之未逾三晝夜變毒為瘡而愈三壇戒法得以圓就庚子二十參先師德水源和尚於城山聽楞嚴二十一天竺聽戒疏二十二三研究賢家諸祖教部內衡法師聽楞伽二十四五蓮居學性相宗聖先法師聽唯識靈滄法師聽起信二十六春夏上竺聽老師楞嚴石公和尚聽華嚴懸談景淳和尚聽施食儀軌重治五教儀成六卷請正先師肯之曰賢宗教觀今方備矣復立願每月施食六壇夜夜變食出生本年康熈丙午臘月八日受老師衣法於雲栖屬五世孫也誡勸熟習經論本文毋支離於諸家註解二十七二月望夢金甲神曰十九歲難已過今年難過生日矣因加如意陀羅尼百八徧於楞嚴呪後晨夕病冗無間迨誕辰忽夢僧曰宜持釋迦藥師彌陀三佛名於楞嚴前加藥師往生二神呪於如意後可免三十三歲之災此後早晚課之不缺更自號為灌頂憶昔先師熟誦本文之囑又將楞嚴法華圓覺梵網金剛藥師華嚴名號問明淨行梵行僧祇隨好行願等品四分律起信論唯識頌法界觀一日五葉細細記背三晝一轉練為常行二十八九復究三宗諸大部典重作標本以備遺忘更刪出五教儀開蒙一卷康熈九年庚戌春三十歲排五教繼證圖眾善信施衣禮請就本寺開講般若中元節湖上王醫家施食召請時陰風忽發燈燭盡滅眷屬遠避一心觀念頃刻間燈燭復明濟後不復有嚎哭之聲三十一二三集諸學徒講楞嚴三轉時景淳和尚來寺聞之并見教儀及圖合十稱曰毗盧佛之遣使賢首祖之功臣也四明深符述公賀云惟君文行獨超群論議風生擅竺墳高續蓮燈分慧𦦨五雲播彩接慈雲一乳泉一滴傳無盡分出雲根流愈清好向寰中施法雨三根含潤總敷榮二昭慶止千嶽公贈云一鳴思昔日河辯已驚群慧業彌高峻芳聲更遠聞流泓傳乳竇雨密蘊慈雲行見談經處天花向座紛外又撰楞伽記三十八卷三十四楞伽圓談十卷講金剛法華俞文學緯贈云心依佛火性離塵獨向祇林結靜因講席幸承甘露潤香臺深喜惠風親九天梵落曇花發二月春和柳色新衰力憾予聞道晚大師覺世不辭頻潘文學輿贈云陋室傍慈雲朝昏慰所聞提撕開鹿苑領略謝鷗群其奈冤親聚難將恩怨分懷哉新著述應拯出塵棼孫文學治贈云我聞無上義圓解比醍醐達者領其要亡筌與世殊間造青蓮舘把玩囊中珠光曜照四野豈復類𤥭璖仁鳥簷下鳴紅藥堦前敷白雲停翠樹青烟生紫蒲如晤象王因倘恍雨花初鄙懷足怡悅自笑為世儒趙孝廉驪淵贈云內典橫千帙幽躭坐小樓看君無執著隨意白雲遊冬初翻胃疾發還夢金甲神曰爾欲延壽愈病可飲此漿吞之若藕汁口內發香寤已遍體瘡生不旬日二症並愈三十五講楞伽引并五教儀褚堂周文學延作繫念夢母歡謝東清里孫文學孝楨家放𦦨誦破獄真言時幼小兒孫見諸宗祖及眾親隣俱來赴會驚異之湯文學駿發室周氏病癎若有鬼魅附之者一薦度時狂囈即止三十六出五教儀科註四十八卷及蓮花鏡燈二章三十七講華嚴懸談戊午三十八歲春赴聚光法華講期子母為爾請予披剃說三歸戒冬赴戴府丞復齋先生華嚴經會述勢至疏鈔一卷己未三十九歲就於本寺慈雲開為叢林厨庫浴圊充拓廣大禪堂安眾𤀹池放生春講法華夏論起信中元啟蘭盆期設無遮會秋演楞嚴子於輪下親聞復講彼時眾中推為上首次出起信摘要二卷蘭盆會纂八卷庚申四十戴府丞因起信疏記各自為帙命作會本易於披對遂合二十四卷編成十卷科文一卷五祖略記一卷法相圖錄一卷更出四十二章經疏鈔五卷募刻五教儀戴府丞贈曰身在雲堂二十秋靜依禪觀度群流軒眉祇為談經合行藥翻因問義留梅塢淵源原不濫慈雲章草孰偕修臘高德厚從來說四十登壇君最優戴長公仁長祈疾痊愈刻勢至疏鈔又請住紫雲辭而不去任文學谷葊慕繫念法門妙刻之施行四十一陳文學調元夢妻求薦三七瑜伽化錠五千五七繫念復化五千夜睡眠間見其室人幡樂引去著觀音疏鈔五卷又為王居士心賢述西資歸戒一卷刻蓮花章鏡燈章斷證圖三本同帙四十二科楞嚴并疏鈔初二卷刻四十二章經疏鈔及五教儀開蒙四十三春講楞嚴夏疏觀經二卷冬解金剛四卷甲子四十四春汝住崇壽院為啟金剛講期著藥師疏鈔六卷刻金剛直解冬赴德清潮音院般若講期解制日檀信請住再三辭止乙丑四十五春應楊梅塢楞伽講期疏如意呪經一卷付五比丘衣法長明月標指姚園悅峰賢報國與安慈興福玉山朗崇恩劍眉開期畢合院耆宿命常住持亦三辭止夏初周學士石公任兵科千祉二先生請住上竺中元戴府丞起信疏記會本之刊移在慈雲觀堂較刻八月開講施食儀軌觀經疏歸戒文並付剞劂丙寅四十六講金剛觀音二經囑累二嗣一本寺啟南詢二真寂德林蕃秋杪邵司天鶴亭先生迎往上竺丈室隨輯華嚴觀自在知識章記一卷開示四眾四十七春啟法華講得傳者三人崇慶西民航拈花大振音萬嵩爾乘吉七月起信疏記會本告圓四十八春應戒壇院法華講期別著像想章疏一卷放生剃度歸戒儀各一卷纂課誦諸經全集二卷刻五教儀科註十卷己巳四十九春初邵學士戒三公因聖駕南巡進山命大眾迎請主持隨講金剛觀音彌陀𦦨口心經光明空品鈔心經疏三卷法界觀鏡註纂二卷庚午五十春三月毗盧後殿上前後軒樑竪四簷石柱另造耳房八間塑老師像供於丈室鐫中興立於大士殿前講四十二章經十六觀經溈山警策疏八大人覺經一卷鈔遺教經疏四卷註溈山警䇿一卷五十一回慈雲裝大殿湧壁三大士并羅漢諸天聖像起山門五十二司天邵鶴亭先生命出𦦨口施食廣略二解共十二卷萬安橋說瑜伽歸戒五月屠世相薦室江氏放𦦨時諸鬼神附男壠現種種異相而去七月望旦仁社命江干說瑜伽戒五十三毛太史施金寫𦦨解眾信助刻𦦨儀甲戌五十四刻大悲準提呪解瑜伽歸戒出顯密翻譯名義春赴聖果講金剛般若囑偉賓七月講蘭盆五十五刻燄口略釋放生儀又春初工部侍郎徐公浩軒郵命住聖果講法華開三壇大戒囑紫雲月因可久朗然吼山毓六子出萬佛懺及問答決疑五十六春曹庵講法華囑大樹弘苑二子徐工部刻萬佛懺觀像章疏持驗因果記夏回寺裝四天王像秋聖果啟講報恩經丁丑春五十七歲昭慶宜潔律師命較毗尼香乳記夏發瓦植修彌陀後殿五十八春崇壽院講金剛心經付明藏默聞及汝三子衣較昭慶羯磨儀并述序五十九募王居士國瑞施鑄佛殿大鐘三月初七夢天官請升殿堂講華嚴大經見一聖僧來為證記代為昭慶註出梵網會詮二卷庚辰六十歲春於崇壽院講行願品彌陀觀音二經出彌陀解音釋尊勝呪經六十一延李司衡居士寫藥師疏鈔并懺三卷勸明藏師募刻彌陀經解張佐平居士施刻尊勝呪經春暮徐監生汶請詣許村四廟施食三壇超度溺水三十餘人息免地方鬼患冬刻慈雲寺志八卷六十二春應平湖南寺開講彌陀疏鈔學士高江施刻金剛經并手書心經一卷以贈回寺端陽節後修觀音殿募王施主國士刻藥師疏鈔六卷河南巡撫徐潮寄捐俸銀刻𦦨口疏了昔許愿六十三春化周子鉉先生書刻華嚴別行品經六卷印傳三月昭慶圓印師請出毗尼切要蒙解八月請出沙彌廣解二卷冬月司天邵泰衢命出心經二解佛祖綱宗四卷六十四述傳心四集秋八月科提玉林國師工夫客問二說乙酉六十五春勸善信楊軼千先生刻報恩懺三卷秋為織造部堂敖公福保安施食府署設筵四方知識來壇坐證病痊身泰禮謝贈衣冬刻佛祖綱宗及吟淨土百詠六十六春為默聞上座集刻彌陀懺三卷十月因廣修法座集刻賢宗十要并賢首傳昔所刻書五教儀註盡皆囑付與他勸在神京流通六十七刻七佛藥師懺三卷撰華嚴別行記六十八較正昭慶沙彌律解冬刻醒世善言六十九勸司織楊公耀祖刻大悲像手呪釋又刻心經二解付昭慶律師較釋大懺悔文華嚴別行記八卷并圓談二卷稿成庚寅七十歲勸文學徐汶刻準提呪印集要化善士王國瑞裝慈雲公主像并刻靈感籤經及神異傳秋季因諸山眾師請開講瑜伽施食經儀一期兼出華嚴字母釋及普菴呪與悉談章解冬十月太史八十八叟西河毛奇齡祝壽詩曰神智光明照大千生同剎利梵宮前蹋來江草當飛錫落盡天花似雨錢六甲屢迴翻玉曆雙趺何處結金蓮須知迦葉傳經後猶是昭王二十四年葢前本末因緣略陳如是而已過此已往未可定也然以予之視古德者萬不及一如天台之建立佛剎慈恩之註疏經論不空之呪印賢首之講演清凉之承嗣密藏之刊刻是可思議耶不可思議耶心有餘而力不足是實為內疚耳汝宜猛心發願努力修行要與往古佛祖齊肩始滿出家比丘志焉稍一不如非釋子也豈以獨善為安哉思之勉之康熈三十九年歲次庚辰六月十七日自語迨四十九年歲次庚寅臘月十七立春節旦重識實行於崇壽紫竹林中因稱名曰古希紀浙杭龍崗門嗣證文記錄浙江天竺山灌頂伯亭大師塔誌銘泗水佛弟子徐自洙頓首拜誌維雍正六年歲在著雍涒灘孟夏月朔有灌頂大師示寂於上竺焉師本無疾猝于月朔前一日明示遷化即說偈曰生死路上逍遙自在稱觀音佛往生蓮界蒙佛授記圓通無礙依佛願力度生億載翌日日正午沐浴辭眾趺坐合牚西向而逝越六日入龕色如生異香滿室觀者萬人咸羅拜垂涕以活佛稱之嗚呼使非功行超卓足動遠邇胡為生慕死哀若是耶爰諏日將建塔于法華山之陽時有嗣法門人等羣請銘於余余曰大師慧命弘深豈予塵俗所能道其萬一但余與師遊于茲四十餘年矣知之深久而彌篤今之舍余而歸也苟無片言以道故沒其生平是負師也余何敢以不文謝按師初名續法更名成法伯亭其字灌頂其號也仁邑亭溪人俗姓沈父諱相母張氏遡厥淵源出世初祖帝心和尚諱法順時號燉煌菩薩隋文帝給月俸唐太宗賜號帝心二祖華雲法師三祖賢首國師四祖曰澄觀號清凉國師五祖曰宗密號圭峯大師自華雲至圭峰皆名震朝野唐自太宗以至文宗咸賜封號歷朝撰記炳如日星圭峯傳徹微徹微傳海印印傳法燈燈傳長水長水傳伯長伯長傳中和中和傳佛智智傳玉峯自玉峯而後有性空竹坡潔菴珍林聚英春谷一雲古峯止翁達菴魯山徧融等由是一十二傳歷唐宋元明各建法幢備載新註華嚴佛祖傳凡二十六傳至蓮池大師諱袾宏大弘淨土之教為末法慈航即師之高高師祖也二十七傳則有土橋紹覺法師名明理二十八傳則有蓮居新伊大師名太真二十九傳而為乳峯焉稱德水法師諱明源號寶輪初生有白鶴之徵參講有香水之夢解脫時有花幡天樂引導三閱大藏註釋萬言洵為前輩指南而師實受其囑法焉師早失怙恃即有出塵志九歲禮慈雲祖源名宿為師十六薙染十九圓戒二十參乳峯聽楞嚴遂爾宿慧駿發洞澈微旨復講四席次于蓮居聽聖宣師唯識臨滄師起信併資古月朗碧諸人竝參焉時學者千二百餘唯師法契於心如針投芥獨得其奧平居甞論天台賢首之異同折衷于乳峯乳峯以先師雲棲大師之說曰汝研清凉當審二派之所以異而毋濫狃其所以同能審其所由異自辯其所由同而并參其非同非異者而證悟焉則功圓俄頃見佛于塵毛矣何彼此分岐之異執也是時師正容諦聽豁然頓悟以為真吾師也而乳峯亦喜傳炷之得人矣遂卜臘月八日受衣拜囑詞曰志超界外慈徧塵剎律是汝師論是汝友依佛弘化大小隨緣忍定願智習久力生如佛所行盡未來際遂更師名為成法乳峯隨于廿四遷化法嗣有三而師為上座云初乳峰待師恩義兼至而師亦執弟子禮唯謹至是痛乳峯之長逝乃泫然曰佛經有大報恩七篇孝以繼述雖衲子何獨不然乃葺其墖院設位以時祭之遂杜門却埽研誦楞嚴梵網圓覺般若華嚴法華四分律起信等極晝夜無倦容自二十至三十十年中精研諸部經典不唯一家教觀朗然洞曉即諸宗岐途亦深入融會因講金剛楞嚴于慈雲大殿聽者淪肌浹髓而去非真實了悟何能辦此也自是戒律精嚴應四方之請無虗歲所至不一地而所演說者亦非一經即如仁壽時會江潮猝至傾瀉塘碪二十餘里民居漂溺者不可勝數而師之講席獨安然無恐豈非說法之明驗歟年四十開堂為慈雲兩修彌陀大殿裝四王三聖像又丁酉重整後殿新裝接引大佛余聞慈雲創于唐大于南渡歷今九百餘稔可謂歷年多而為時久而師以一力新之不忍湮沒功何偉也他如重建聖果仁壽并葺諸梵宇指不勝屈先是康熈乙丑春宮詹周公兵科任公延師于楊梅塢講楞伽未幾聖祖仁皇帝南巡學士邵公率眾以禮請入方丈恭迎聖駕囑竣毗盧殿工自康熙三十八年至四十六年凡幸五次賜賚優渥御製文一道永鎮靈山前後疊賜匾額心經寶塔藥師經讚金剛經恩賚有加無已又值總河王公捐俸千五百金未兩載毗盧殿成師為陞座講彌陀觀經金剛遺教普門品勢至光明空品等善姓感仰樂助多金師復塑十六王子像重修梵剎師之聿新于上竺也筆難殫述閱六載師欲退院諸紳衿耆老修扎欵留師曰濫膺丈室豈佛子所宜遂辭歸仁壽仍幽居斗室木食草衣一衲十年一履三載手不停披者五十春秋註釋六百餘卷人驟見之不知其為敷坐說法人也憶昔西湖斷橋有菴曰德生為師止靜處創自向若錢老夫子太史毛先生孝子周雲子父執暨余兄東表孟師等主其事凡祀聖拾字掩骼放生薦祖度孤皆行於中師撰二儀篇以記其事迄今師臘已高方期行瓢帶笠面壁天涯終其身為無事人而已詎意康熙辛丑春上竺致罹祝融遂使靈山鐘鼓寂然無聲寶地樓臺悉為瓦爍嗟乎以師數年心血一旦盡付丙丁垂淚傷心可勝言哉不得不再邀慈雲之法雨顒望于遠公也是以悟慈等二十八人先稟當道暨諸縉紳先生時則有少宰湯學士陳翰林徐提學翁御史柴三十餘位并三學同人六十餘友啟請大師入山主持重建師于是立規䇿眾明佛法廣福田施樹祇園者布金給苑踵相接矣辛丑夏至戊申春大士龍庭樓臺行宮香案西禪堂北客寮東伽藍祖師地藏天王各殿門扉坦牖經營布置規模略成師之功固大而用心良苦矣歲壬寅御賜龍眼菩提子四粒植于大士殿左右師恭咏賦一章以頌無疆之盛典今我皇上御極以大士為民慈父旱乾水溢有禱輙應于雍正元年特命大臣進香二年勅修慶山祖塔皆師之精誠有以默致惜工將竣而師已西歸良可悼也師生于崇正十四年十月十一日戌時世壽八十八僧臘七十九其一生梗概心不違如來之訓性不染塵俗之累體不損沙門之表行不違法律之經目不視非儀口不食重味手不釋念珠脇不觸塵榻足不履邪徑宿不離衣鉢入污泥而不染處混濁而不淆以清淨弘法門以智慧為福果皇皇于超濟汲汲于普渡不以一行自高一功自許人有歸依者不俟請而往有求益者不待憤則啟矣雖幼穉不簡于應接縱傲狠不憚于開誘洵乎佛祖之化身眾生之模範也師為德水嗣六十載凡過忌辰必親臨掃墖以禮供非唯罔缺直事之如生不忘師教又如此其付衣傳法者有長明月標姚園悅峯仁壽旭如曹源可久筏喻劍眉東來弘苑報國與安興福玉山馬鞍默聞鳳山明藏拈花大振北京體閑慈雲啟南上竺培豐慈裔正中天懷通計廿有餘人其僧臘者不能悉記所著經典有華嚴別行經圓談疏鈔記十二本楞嚴經序釋圓談疏廿五本賢首五教儀六卷科註四十八卷起信論疏記會閱十本藥師疏鈔六卷觀音疏鈔八卷金剛直解五卷四十二章經疏鈔五卷觀經直指疏十本瑜伽施食經疏十本觀音疏彌陀略註如意經疏心經二解尊勝經疏勢至疏鈔像想章疏八大人覺經解大悲呪釋准提呪釋各一卷佛祖綱宗四卷賢宗十要二卷持念因果記念佛異徵記樂淨土咏醒世善言西資歸戒儀瑜伽歸戒儀繫念儀放生儀各一卷𦦨口儀疏十本𦦨口摘釋一卷共一百六十八本己亥秋余兄東表捐貲遣余送入楞嚴寺藏嘉禾郡尊吳公作序以待後之取者其未付梓者統計一百二十六本皆師歷年手輯余所目擊惜乎辛丑雲房失火化為灰燼自回祿後所註并代刻未入藏者如法華圓談科註十七本命予手錄請解則自聞一法師作序則有理安迦陵于康熈六十年寄送入都南觀音寺轉勸配天法主募刻流通又萬佛懺報恩懺彌陀懺七佛藥師懺改訂觀音懺各三卷并華嚴別行品經便于四眾一日禮誦板存昭慶又金剛開蒙註開道註開悟註心經開蒙註共四集便三乘人一目了然又上竺誌慈雲誌仁壽誌楞嚴誌板存各寺又去冬撰仁皇懺三卷以祝聖祖不可思議之弘恩保蠶懺三卷以佑兆民時和年豐之利賴稿存丈室獨雍正四年所註華嚴宗佛祖傳十四卷未鑴葢自佛祖至今源流始末辯駁異同悉從藏經考摘非曰為賢首伸說即諸宗靡不受益廼示後學入德之津梁也詎意騰錄較訂方畢而師猝然遷化于上竺必付諸梓俟後入藏以垂不朽又嘗序四書序圖章解綱鑑隨筆問道說覺迷錄皆深入性理足以知其通儒也惜乎以浮屠氏終焉嗚呼師年已登耄耋篝燈纂註雖蠅頭細揩罕有塗抹嘗謂余曰每當註釋浩繁略閉目間甘露灌頂神思飈發迅筆成文不假思索噫此皆師之夙慧圓明余與師心相莫逆數十年來交最久知之又深非師孰能鑒我非我無由誌師故不自知其言之津津而筆之縷縷也即註釋一事實足以繼往開來闢千古未有之暢典謂之一代之祖師也可即謂之千百世之祖師也亦無不可師之標靈顯異誠難枚舉茲撮其大端而為之銘曰我聞萬生各具物性人苦未見見而未盡偉哉大師福慧宿定受囑乳峯遂傳心印蓮池嫡派賢首宗乘神光上燭故號灌頂三藏覺迷五部深省飛錫慈雲梵宇是興竪竿上竺琳宮復整施食兮鬼神潛伏說法兮魚龍出聽受聖朝之寵渥為士庶之信敬八十八年功完果證勿云明鏡胡然而隱一物本無何用照映勿云空谷叩之不應萬象皆空覺然後醒摘葉拈花搏風捕影雲散水流天空月靜上竺灌頂大師囑法語孔門四配佛門四弟羅什四賢達摩四得燈明有八王子智勝十六王孫咸以童真出家沙彌成道迨於釋尊法華會上四眾八部靡不計校我祖雲棲大師北訪徧融教主授以老實念佛依佛行道莫貪名利毋逐世緣祖衣法印開淨土門疏鈔彌陀蓮宗徧振先師德祖傳我佛印遙承五代進住上竺丈室興廢經始兩轍講註經典不一而足天竺靈山固多英俊大士臺前四傑推首或為人師或以律範名譽遠稱紹隆香火從予轉輪妙堪遺囑即佛即心是心是佛廬雲棲佛種不絕五峰長水法炬熾然聖祖寶座龍床登坐度生祖印長相傳付仁皇燈臺香几行來照世皇圖鞏固遐昌今以衣法囑咐天保定爾四人如昔五百羅漢轉次授受無異餘多才達且待後緣云爾囑法第一子培豐付藏佛一尊紅衣一件知見寶藏非從外出佛頂髻珠皆從自得福基慧命陽春培植智種靈苗增秀成實洪範五行莫不赫奕囑法第二子慈裔付藏佛一尊紫衣一件從佛口生依佛行止得佛法兮真大士子嚴淨毗尼成正徧知傳聖觀心佛法住持儀範三界慈隆百世囑法第三子正中付塵一爐一文學游夏言語宰貢政事季冉德行伯仲具聖一體豁然大用羿教人射正在彀中行大士道事事圓通囑法第四子天懷付杖一鞋一天生於予克懷明德代佛行道陰陽呂律大智權辯隨機調適上和下睦君欣民澤教化域中順帝心識奉大師命沐手代書曉諭合山時雍正六年三月二十九己卯日也皇宮賞賜物件寶座臺張杏黃縀墊子一箇龍牀壹張硃紅大立臺一對香几壹張燈臺壹對書桌壹張燈臺壹對
